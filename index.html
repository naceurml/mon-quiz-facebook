
  <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Hello World Marketing</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        #welcome-msg { margin-top: 30px; font-size: 24px; font-weight: bold; color: #1877F2; }
    </style>
</head>
<body>

    <h1>Offre Exclusive</h1>
    <p>Connectez-vous pour découvrir votre cadeau personnalisé.</p>

    <div id="fb-root"></div>
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/fr_FR/sdk.js"></script>
    
    <div class="fb-login-button" 
         data-width="" 
         data-size="large" 
         data-button-type="continue_with" 
         data-layout="default" 
         data-auto-logout-link="false" 
         data-use-continue-as="true" 
         data-scope="public_profile,user_location"
         onlogin="checkLoginState();"></div>

    <div id="welcome-msg"></div>

    <script>
      function checkLoginState() {
        FB.getLoginStatus(function(response) {
          if (response.status === 'connected') {
            // Requête vers l'API Graph
            FB.api('/me?fields=first_name,location', function(user) {
              const prenom = user.first_name;
              const ville = user.location ? user.location.name : "votre région";
              
              document.getElementById('welcome-msg').innerHTML = 
                "Félicitations " + prenom + " !<br>Une surprise vous attend dans notre magasin de " + ville + " !";
            });
          }
        });
      }

      window.fbAsyncInit = function() {
        FB.init({
          appId      : '2084441428788121', // Les étudiants collent leur ID ici
          cookie     : true,
          xfbml      : true,
          version    : 'v19.0' // Version 2026
        });
      };
    </script>
</body>
</html>
